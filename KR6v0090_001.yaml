可見這次曹宗壽為報恩寺添寫藏經實際動員了敦煌僧團全體的力量在此我們僅將壬寅年報恩寺配經付紙歷涉及的佛典名稱抄録如下抄録時遇到簡寫縮略一如其舊如有明顯重復則不豫抄録壬寅年六月二十一日配經歷花嚴經五分律顯揚論十誦律大威德陀羅尼經瑜伽論大法鼓經毗奈耶雜事瓔珞經寶網經觀世音菩薩授記經大方等如來藏經金色王經稱揚諸佛功德經除恐災患經學首楞嚴三昧經優填王經王法正理論瑜伽論釋百論顯揚聖教論頌摩登伽雜寶藏不空羂索壬寅年七月十六日付紙歷五百弟子自説本起經月燈三昧經大灌頂經入定不定印經大乘方廣總持經讚頌大乘經十一面經金剛頂輪經蘇悉地經大雲請雨經解深密經三具足論阿彌陀經無量壽經濡首經觀自在菩薩隨心咒經金剛上味陀羅治禪病經七處三觀最勝佛頂陀羅尼六字咒王經經雜咒最勝陀羅尼經百寶護命法門經妙臂陀羅尼經優婆夷淨行法門經菩薩戒經法門經善戒經菩薩藏經師子月佛本生經長者女庵提遮師子吼了義經淨業障經十二頭陀菩薩戒本菩薩羯磨本廣大寶樓閣善住祕密陀羅尼五佛頂三昧陀羅尼末主字咒添品法華經月燈三昧經修行本起經寶雨經般舟三昧經無言童子經念佛三昧經觀普賢菩薩經施燈功德經長阿含六度集鴦崛魔羅經文殊師利寶藏經佛説隋求陀羅尼大普賢陀羅尼經金剛光焰止風雨陀羅尼經摩尼羅亶經一切功德莊嚴王經香王陀羅尼經如幻三昧經彌勒菩薩所問經寶積論彌勒菩薩經菩薩地持經上述共部但由於原卷首殘且有菩薩戒本等四經菩薩羯磨本等二經的説法所以此次實際添寫的當不止這部僅就這部而言除了名稱殘缺無法考證的末主字咒外其餘部均為開元録入藏録所收經典年時中原的不少大藏經已經收入不空譯經及宋代新譯經但看來報恩寺的這部藏經仍然固守開元録入藏録的傳統未作顯著改變總之我們可以肯定從五代到北宋敦煌雖然孤懸為外國但該地的大藏經與內地一樣以開元録入藏録為其造藏依據在拙著八十世紀佛教大藏經史中我曾經指出雖然會昌廢佛後全國的藏經統一到開元釋教録入藏録的基礎上但由於寫本藏經本身的特點也由於各地的寫經因為用紙不同分卷常有差異所以各地的藏經在流傳過程中又發生岐異從而造成統一中的分化這種情況在敦煌也有反映如北敦號抄經部都標注有千字文帙號這些經典的排列與開元録入藏録完全相同但它們的千字文帙號卻與開元録入藏録有一個字或二個字的參差正是這種參差造成刻本藏經時期我國的大藏經出現北方中原南方三個不同的系統開元釋教録撰成於開元十八年其入藏録收録了經過智升考訂的經典部卷分作帙但開元十八年後佛典仍不斷譯出其中特別是不空譯出大批密教經典這些經典都未為開元録所收故貞元年間釋圓照編纂貞元録將這些經典也收歸入藏但是會昌廢佛使貞元録藏經幾乎絶迹全國按照開元録入藏録修造藏經貞元録增補的經典便孤懸在藏經之外全國各地的藏經有些僅收開元録入藏録部分有些在開元録入藏録之外加收貞元録增補經敦煌的情況如何從現存的敦煌遺書經録看貞元録傳到敦煌此外敦煌遺書中存有不空譯經的殘卷由此我們可以肯定在敦煌地區也應該收藏有貞元録增補經北宋初年諸帝都對佛教持支持態度國家設立譯經院專門從事譯經活動並譯出一大批經典宋會要蕃夷五載至道元年五月歸義軍節度使曹延祿遣使入宋貢方物乞賜生藥臘茶供帳什物弓箭鏡鈸佛經及賜僧圓通紫衣宋朝並從之當年十月曹延祿又遣使上表北宋要求將宋朝新譯諸經降賜敦煌宋朝從之我們知道我國的第一部木刻藏經開寶藏初刊於開寶四年至太平興國八年初刻時祇有開元録入藏録部分其後增補了開元録後新譯經與宋代新譯經其印本遍賜日本高麗女真越南遼西夏等諸國根據上述宋會要蕃夷五的記載我們現在可以肯定最遲到至道元年開寶藏已經傳到敦煌此外根據宋會要蕃夷五與續資治通鑑長編卷八二北宋景德四年閏五月沙州僧正會請入宋庭以歸義軍節度使曹宗壽表乞賜金字經一藏宋真宗下令讓益州寫金銀字藏經一藏賜之又宋會要蕃夷五續資治通鑑長編卷八二宋史卷四九等載大中祥符七年四月當年曹宗壽逝世其子曹賢順任節度留後曹賢順表乞金字藏經及茶藥金箔詔賜之綜合上述資料北宋初年藏經洞封閉前後敦煌地區的經典已經比較充裕有北宋頒賜的內容豐富而完整的開寶藏與多部金銀字大藏經也有當地自己修造完整的大藏經藏經洞封閉的是一些不堪卒用的殘破經卷而那些完整的寫本刻本金銀字大藏經則繼續發揮著它們的作用當然如吐蕃時期龍興寺經藏所示有時經藏中會有若干疑偽經進入北號也反映出這樣一種情況該號首題癸未年或八月十一日於經藏內點勘經教現有部帙數目具録名於後者卷首著録兩部大般若一部是金字題頭並錦帙子一部是布帙均有缺失其後著録經卷多帙從總體情況顯示這裏著録的顯然不是一部完整的藏經而是一些雜經有意思的是其中有一帙收入部經典其中有疑偽經部人集月燈經要略首羅比丘經讚僧功德經延壽命經法成所譯敦煌特有經部大乘稻稈經諸星母陀羅尼經通觀全録除了上述四部疑偽經與收在另一帙的大通方廣經外全部都是應該入藏的經典而這些經典的相對集中存放説明即使是雜經其儲存也有一定的規範由於這幾部疑偽經處在雜經或續藏的地位所以它們的存在顯然也不能改變敦煌地區大藏經屬於義理性大藏的基本特點長興五年三界寺僧人道真收集修補古舊破壞佛經是人們已經熟知的事關於這一史實筆者將另文論述總之這一時期的敦煌經録為我們展現出當時敦煌寺院經藏的基本概貌就是以開元録入藏經經藏為主流同時存在著若干古舊雜經古舊雜經的情況比較復雜不能一概而論至於民間流傳而沒有入藏的各種佛教文獻這應該屬於另一個論述題目本文不擬涉及三餘論自從接觸敦煌學以來比較注意信仰性佛教的問題佛教本來就是一種信仰乃至任何一種宗教本來都是一種信仰所以信仰性佛教一詞似乎有同義反復之嫌但佛教作為一種宗教既有比較精細高深的哲學形態也有比較粗俗普及的信仰形態所以它能夠適應不同層次人們的不同需求乃至同一個人的不同心理需求我把前一種形態稱為義理性佛教把後一種形態稱為信仰性佛教義理性佛教以探究諸法實相與自我證悟為特徵而信仰性佛教則以功德思想與他力拯救為基礎義理性佛教在我國佛教史上處於主導地位它的興衰決定了中國佛教的興衰但信仰性佛教為中國佛教奠定了雄厚的群衆基礎是中國佛教綿長生命力的基本保證所以所謂信仰性佛教是與義理性佛教相比較而存在的一種相對來説誠信成分較濃的佛教形態信仰性佛教與義理性佛教有各自不同的特徵這已經是學術界的共識也有研究者用民衆佛教民俗佛教來稱呼前者用高僧佛教來稱呼後者但我認為參與諸種功德活動的除了普通民衆外也有大批的上層人物乃至帝王后妃民衆佛教還往往與民間結社祕密宗教甚至農民起義相聯繫而用民俗佛教這樣的名詞則往往與民間風俗習俗相聯繫容易産生誤解高僧除了探究佛理也同樣虔敬地參與各種信仰性活動如道安的兜率淨土信仰與慧遠的彌陀淨土信仰所以民衆佛教民俗佛教高僧佛教等詞都有一定的局限性不能反映這兩種佛教形態的本質特徵在我看來信仰性佛教為佛教提供了廣大的群衆基礎與堅強的軀體義理性佛教為佛教提供了高水平的骨幹與活潑潑的靈魂都是佛教必不可少的形態兩者看來似乎截然不同甚至尖鋭對立實際又相互滲透互為依存很難把它們分開如同一張錢幣的正反兩面密切結合如般舟三昧宣揚一種在誠信基礎上的十方諸佛悉在前立的禪定法並用夢中見佛來證明之顯然是一種信仰的形態但它最後又把諸佛歸結為緣起性空表現為明確的義理的形態又如慧遠是著名的義學僧但又是彌陀淨土的信仰者與提倡者唐玄奘也是著名高僧但他也專注於彌勒信仰希望投生於兜率天因此對於某一種具體的理論或某一個具體的人物必須具體分析當然我們也必須看到歷史的邏輯並不使信仰性佛教與義理性佛教始終保持緊密結合的狀態而兩者如發生偏離佛教的發展便面臨問題但這應該在另一篇文章中探討這裏不談相對而言研究信仰性佛教要比研究義理性佛教困難得多原因主要在於資料經過歷史長河沖刷而遺留至今的佛教資料大多是歷代高僧整理的都是各個時代的佛教精英文化的反映而那些能夠反映當時活生生的佛教活動的資料則大抵被淹沒了敦煌藏經洞的發現使大批反映敦煌地區當時佛教狀況的資料面世為我們研究敦煌佛教包括敦煌的信仰性佛教提供了珍貴的資料但如何正確地利用這些資料仍然是我們面臨的一個重大問題從總體看我們研究敦煌佛教主要資料來源於以下三類敦煌遺書包括藏經洞遺書與非藏經洞遺書敦煌洞窟包括雕塑與壁畫其他資料主要指各類傳世文獻三類資料各有各的優點各有各的局限敦煌遺書雖然保留了衆多珍貴的研究信息但畢竟是古人的廢棄物應慎重處理鑒別且遺書的産生時間段相對集中不能反映敦煌佛教的歷史全貌敦煌洞窟反映了敦煌古代人民的信仰與感情是研究敦煌佛教的形象資料但還有大量的與書面文字印證的工作要做才能真正揭示其宗教內涵這一工作雖然已經取得很大的成績但與它需要達到的目標還有較大的距離至於傳世資料優點是數量想必相當可觀時代跨度也大但散見於各處收集困難即使收集齊全也零亂而難成體系近年來中國各地都開始注重地方佛教史的研究這種研究的主要困難之一就在於純粹的地方性佛教資料比較難找而傳世資料中的有關資料又零亂而不成體系因此一些完全依據傳世資料寫成的地方佛教史幾乎千人一面較難真正反映出地方的特色當然這裏也有編寫者的指導思想問題這裏不談相對全國其他各地而言敦煌有敦煌遺書敦煌洞窟可作參照所以在撰寫地方佛教史這一點上敦煌的資料條件較為優越雖則如此困難依然重重蜀道之難難於上青天研究敦煌佛教從可利用的佛教文獻的構成類別來講可以分為兩大類傳統大藏經以及大藏經以外的其他佛教文獻在不同的時代兩者固然互有滲透但在同一個時代兩者還是有一個為公衆共同承認的基本界限當然任何界限都有局限何況寫本經藏本身有著極大的包容度或者説極大的變容度允許多種形態的共存加之不同的人對界限的掌握有寬嚴的不同不同的時代又會有不同的風習這些自然都要影響到經藏的形態但無論如何經藏文獻與經藏外文獻的區分應該成為我們進一步研究的基礎我想這或者就是我們研究敦煌地區寺經藏形態的意義
