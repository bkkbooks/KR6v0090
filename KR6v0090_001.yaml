body:
  text: 方廣錩一前言敦煌遺書的面世為我們研究敦煌佛教提供了大批第一手資料但如何正確看待鑒別這些敦煌遺書的性質以及如何正確利用它們仍然是擺在我們面前的一個重要課題本文想探索敦煌地區不同時期寺院所藏大藏經的情況以為我們更好地利用敦煌遺書提供一個參照系在探討這個問題之前我想説明一下我的基本觀點首先敦煌佛教屬於中國漢傳佛教系統因此它的各個基本方面包括它的大藏經要受到中國漢傳佛教總體背景的制約任何脫離中國漢傳佛教總體背景討論敦煌佛教的方法恐怕都值得斟酌其次大藏經是按照某種理念編纂的佛教大叢書不同時期的大藏經有著不同的形態但其基本理念則大體是一以貫之的我們在考察不同時期不同形態的敦煌大藏經時要兼顧這種理念再次敦煌又有自己的特點舉要而言敦煌是中西交通的要衝佛教通過敦煌傳入內地也就是説敦煌比內地更易與西域聯繫西域色彩更濃敦煌地區是中國文化印度文化伊朗文化西方文化等四種文化儒教佛教道教祆教摩尼教景教等六種宗教的薈萃之地敦煌又曾經被吐蕃占領被西夏統治敦煌是多民族匯聚的地方民族成份比內地更加復雜敦煌有時是中央王朝的有效統治區有時是地方勢力統治區所以研究敦煌佛教包括它的大藏經必須注意它不同歷史時期的上述不同特點把它放到多種文化多種宗教多種民族的大背景下來考察我持敦煌遺書廢棄説站在廢棄説的立場上敦煌遺書中並不存在完整的大藏經所以研究敦煌地區不同時期寺院所藏大藏經的情況不能完全依據敦煌藏經洞出土的佛教經典由此把這個題目分為兩個部分首先聯繫內地大藏經的情況探討敦煌地區不同時期寺院所藏大藏經的概貌其次利用敦煌遺書著重探討敦煌地區當時流傳的大藏經的特色本文主要探討前一部分敦煌寺院所藏大藏經概貌后一部分藏經洞敦煌遺書與敦煌地區的大藏經的特色將另文論述二敦煌寺院經藏概貌敦煌遺書中保留了一批敦煌教團曾經使用過的經録如伯號中有龍興寺供養佛經目録該寺所供養的是一部依據大唐內典録入藏録組織的大藏經伯號與斯號是龍興寺藏經目録北敦號則是靈圖寺藏經目録斯號是當寺上藏內諸雜經録而斯號為點龍興寺上下藏大般若經欠數號是敦煌王曹宗壽夫人泛氏添寫報恩寺藏經録類似資料很多不一一列舉上述資料證明在敦煌地區許多寺廟都收藏著大藏經有些寺院收藏的大藏經還不止一部如拙作八十世紀佛教大藏經史所述中國佛教寫本大藏經的歷史可分為四個階段醞釀階段形成階段結構體系化階段與全國統一化階段但那是就全國而言的一般性描述敦煌地區的大藏經情況如何呢一敦煌大藏經的混沌期在我國的大藏經醞釀階段敦煌地區的經藏如何我們目前缺乏足夠的資料但從兩漢到兩晉敦煌與河西基本可看為一個整體是涼土的重要城市可以設想敦煌流傳的經典應與涼土的經典大致相同我們可以大致考察一下當時涼土流傳的佛典的情況道安的綜理衆經目録特意設置了一個涼土異經録共著録經典部卷什麼叫涼土異經道安沒有作解釋顧名思義應是僅在涼土流傳尚未傳到中原的經典那麼我們能否認為在涼土僅流傳這些經典再也沒有其他經典了呢顯然不能起碼當時涼土流傳著敦煌菩薩竺法護翻譯的不少經典而在涼土異經中一部也沒有收入道安在他的幾篇經序中多次提到僧人慧常等曾經收集到若干僅在涼土流傳的經典送交道安但這些經典並未收入道安的涼土異經此外在敦煌遺書及其他傳世資料如高僧傳等可以發現敦煌流傳一些年代甚早可大體追溯到道安時代的經典在涼土異經中也不見蹤迹由此可見除了涼土異經録所載經典外涼土還流傳一些其他經典想必這些經典在內地也有流傳所以道安沒有特意加以著録那麼我們能否反過來説凡是內地已經流傳的經典涼土全部都有我們也沒有這方面的資料不能對此做出明確的結論從綜理衆經目録可知當時從全國範圍講既沒有統一的佛經目録也沒有按照一定的原則編纂而成的佛教大藏經那麼當時涼土是否有一個包容了本土流傳的全部佛典的經録是否已將這些佛典按照一定的結構組織起來從而呈現大藏經的雛形目前我們也沒有資料可以證明這一點從慧常尋訪經典的情況看當時涼土恐怕不會存在這樣一部包容本土全部佛教經典的目録或藏經起碼慧常沒有看到過這樣的目録或藏經否則在道安的目録及經序中應該有所反映此外綜理衆經目録在設立涼土異經録的同時還設立了關中異經録由此可知當時關中流傳的經典也有自己的特異性有些經典在全國其他地區包括涼土都沒有但綜理衆經目録證實當時涼土流傳的經典與內地確有若干差異這表現在兩個方面一方面涼土流傳著一些內地沒有的經典另一方面內地流傳的一些佛教典籍涼土也未必全部都有這一情況與涼土的地理位置與東晉十六國分立的政治格局是相適應的當時涼土佛教經典的這一狀態為我們理解其後涼土包括敦煌的佛教經典提供了借鑑在我國大藏經的醞釀階段涼土的佛教典籍既然如此那末敦煌的佛教典籍如何呢沒有任何直接的材料可以説明這個問題敦煌遺書中保存的魏晉佛經題記都為寫經與供養題記寫經與供養不等於造藏至今沒有發現一條當時的造藏題記可以證明當時已經出現大藏經已經有人寫造大藏經總之就目前掌握的資料而言我們對從佛教初傳到道安時期敦煌佛教大藏經的情況不甚明瞭我暫且稱之為混沌期二敦煌大藏經的形成期進入南北朝有一個現象值得我們注意北魏永平延昌年間由典經師令狐崇哲等人經手集中抄寫過一批經典據池田溫中國古代寫本識語集録著録目前留存在敦煌遺書中的此類經典尚有號它們的名稱及抄寫時間為成實論卷十四永平四年七月成實論卷十四延昌元年八月華嚴經卷四十一延昌二年四月華嚴經卷八延昌二年四月大智度論卷三十二延昌二年六月華嚴經卷三十五延昌二年六月大樓炭經卷七延昌二年六月華嚴經卷三十九延昌二年七月華嚴經卷四十七延昌二年七月華嚴經卷十六延昌二年七月大智度論卷十二延昌二年七月華嚴經卷二十四延昌二年八月大方等陀羅尼經卷一延昌三年四月成實論卷八延昌三年六月大品經卷八延昌三年七月這些經典的形態基本一致卷末均有題記題記的格式也基本一致如斯號成實論卷十四卷末的題記如下用紙草八張延昌元年歲次壬辰八月五日敦煌鎮官經生劉廣周所寫論訖典經師令狐崇哲校經道人洪俊題記上還鈐有墨印上述號敦煌遺書所鈐為同一印章據筆者所知這個墨印是現知年代最早的鈐在寫卷上的印章它説明最遲在世紀初中國人已經在書畫寫卷上鈐印當時所鈐為墨印遺憾的是該印文至今未能辨識藤枝晃先生曾有專文介紹過上述華嚴經但沒有涉及印文年筆者訪日時曾經就該印文請教過藤枝晃先生他主張該印文應為燉煌鎮但筆者從現存印章字形辨識似乎不類此事尚待方家考訂以上諸經典均為敦煌鎮官經生所寫且鈐有統一的印章歷經年歷史的沖刷還能有這麼種卷經典留存且內容包括了大小乘經大小乘論則似乎説明當初確曾抄過大藏經當然這裏還是存在一些疑問比如為何永平四年抄了成實論卷十四到第二年延昌元年還要再抄成實論卷十四同一部藏經中不應有重復的經典既然成實論卷十四被抄寫重復莫非當時所抄不是藏經而僅是零本佛經或者是抄寫了二部藏經還有成實論僅十六卷篇幅不是很大為何從延昌元年起抄寫直到延昌三年還在抄寫我想延昌三年所抄與延昌元年所抄肯定不是同一部成實論如果這種推測可以成立則當時抄寫的成實論起碼有三部難道説當時至少抄寫了三部藏經雖有上述疑問我還是主張當時所抄確是藏經敦煌鎮既然設立官經生官經生的任務想必就是抄經造藏當時大藏經的規模還不是很大官經生們成年纍月地抄寫幾年下來抄出若干部大藏經也是可以理解的永平延昌時屬北魏上述資料所紀録的雖然是敦煌官經生的活動但所反映的應該是北魏的一般情況這一抄經活動説明北魏時敦煌佛教信仰甚為興盛起碼在河西一帶抄經已經成為官方的事業這也可以説明當時佛教在社會上占據重要地位這是研究這一時期的中國北方政教關係時應該注意的明乎此我們可以理解何以北魏時北方的佛教信衆人數達到一個前所未有的高峰如果説當初的確抄寫了大藏經或者説當時敦煌已經存在有組織的經藏則這部經藏的結構如何呢雖然在敦煌遺書中已經發現了南北朝抄本斯號伯號衆經別録但這部衆經別録在當時組織經藏時的實際作用還缺乏充分的研究敦煌遺書中還發現了號亦為南北朝抄本經録但為殘片僅剩部經典很難作為研究經藏的依據由於缺乏目録依據我們現在無法描述南北朝敦煌經藏的具體狀態在敦煌遺書所存的一些佛經目録中還著録了五卷本衆經目録隋仁壽録或唐靜泰録參見伯號等唐靖邁的譯經圖記伯號證明這兩種全國性經録也傳到敦煌遺憾的是在敦煌遺書中沒有發現這兩種經録的殘卷這兩種經録雖然傳到敦煌但衆經目録在當地組織大藏經的活動中是否起到實際作用目前無法證實而譯經圖記本來就不是大藏經目録綜合上述資料我認為最遲至南北朝敦煌地區的佛教典籍已經進入一個逐步組織為大藏經的階段已經出現有組織的藏經與有組織的造藏活動考慮到印度佛教沒有統一的規範的大藏經規範化的大藏經是在中國形成的則敦煌地區的佛教大藏經的形成可能比內地略微落後若干時間此時內地的經録已經在這裏流傳雖然我們還不清楚內地經録在敦煌地區大藏經形成過程中的具體作用但可以肯定地説這種作用是存在的祇是我們目前無法了解該大藏經的具體情況我想如果我們完成敦煌遺書總目並將其中的南北朝時期在敦煌當地抄寫的敦煌佛教遺書全部提出並豫以整理或者可以對當時敦煌佛教經藏的情況勾勒出一個大致的概貌這祇能是將來的任務綜上所述與內地的情況大致相同南北朝時期敦煌地區的大藏經開始形成並出現造藏活動三敦煌大藏經的內典録時期從現有資料看直到吐蕃統治時期敦煌地區寺院經藏的情況才比較清楚地凸現出來這一點在拙作八十世紀佛教大藏經史中有較為詳盡的論證該書的敦煌地區的漢文大藏經一節中利用敦煌遺書的記載指出敦煌寺院當時已經普遍收藏大藏經既有敦煌僧團公用的官藏也有各寺院自己的經藏有的寺院所藏不止一部分為上藏與下藏利用伯號證明敦煌龍興寺當時供養的一部大藏經的目録依據是大唐內典録入藏録以下簡稱內典録入藏録進而指出龍興寺所使用的龍興寺經藏目録實際是他們依據內典録入藏録改造的其形態可見伯號與斯號該書又利用斯號伯號伯號與伯號證明該龍興寺經藏目録是吐蕃統治時期敦煌龍興寺經藏管理中實際使用的目録由於龍興寺是敦煌當時的中心寺院則可見其他寺院經藏的情況該書還利用伯號證明在張議潮光復敦煌的大中二年年敦煌僧團用以點勘經藏的目録基礎依舊是內典録入藏録此後在拙作關於敦煌遺書北新八六七號一文中又利用北新八六七號新編號為北敦號以下均用新編號證明直到咸通六年敦煌靈圖寺的經藏依然依據內典録入藏録組織此外在敦煌佛教經録輯校中我考證了一系列敦煌經録從而證明直到九世紀末敦煌地區大藏經所依據的仍然是內典録入藏録大唐內典録是唐高宗時期著名僧人道宣所撰從高宗到玄宗開天年間大唐臻於極盛勢力遠達西域敦煌處於中央政府的有效管理之下大唐內典録大概就是在這一背景下傳入敦煌並被敦煌僧人採用的由此我們可以把敦煌地區大藏經依據內典録入藏録組織的時代上溯到唐高宗大唐內典録撰成之後也就是説從那時起直到唐末敦煌地區的佛教經藏一直依據內典録入藏録組織我把敦煌大藏經的這一時期稱為內典録時期如前所述敦煌地區的大藏經既受內地大藏經的影響與制約又有自己的地方性特色這種特色表現在哪裏呢在內典録時期敦煌的佛教經藏與內典録入藏録是否完全一樣呢如果不一樣又表現在哪些方面呢從龍興寺供養經目録龍興寺經藏目録北敦號等諸種敦煌遺書比較可知在內典録時期敦煌地區的經藏形態並非始終保持一致從龍興寺供養經目録看該目録與內典録入藏録僅有若干參差這些參差都比較小無非是某帙增加了若干經典某帙缺少若干經典若干帙或若干經典的排列次序有變動有關參差的具體情況在拙作八十世紀佛教大藏經史中有論述這裏不再贅述龍興寺經藏目録與內典録入藏録的區別則比較大這些區別主要表現在如下幾個方面將大乘律抽出自行合帙多出一個新翻經目録收入一部疑偽經如來在金棺囑纍清淨敬福經將大乘律抽出自行合帙看來是由於敦煌教團戒律生活的需要為什麼當時特別注重大乘律這是一個應該注意研究的問題新翻經目録部分雖然也有一些內典録入藏録已經收入的經典但大部分為內典録入藏録編成以後新翻譯的經典所以沒有能夠收入內典録入藏録中即使是內典録入藏録已經收入的經典也絶大部分為隋唐新譯經由此看來這是敦煌龍興寺僧人為了某個現前目的而編纂的輔助性目録故作為附録放在龍興寺經藏目録之後上述兩個現象的出現説明當時的敦煌僧人已經不滿足於內典録入藏録的結構形式開始按照自己的要求對內典録入藏録作若干改造但是我們不能否認它的目録基礎仍然是內典録入藏録龍興寺供養經目録所收經典沒有超出內典録入藏録收經的範圍而龍興寺經藏目録則比內典録入藏録多出若干經典考察這些多出的經典絶大多數都是按照當時的經藏組織理念應該入藏的但也有一個例外就是多出一部敬福經敬福經實由囑纍經增益演化而成現存敦煌遺書本房山石經本與陝西慈善寺石刻本最早著録在隋法經録中被斥為疑偽經道宣的大唐內典録卷十歷代所出疑偽經論録第八沿襲了法經録的著録囑纍經敬福經等兩種經本現均已整理發表在藏外佛教文獻第四輯囑纍經大約産生於南北朝末期而敬福經大約形成於隋朝也有研究者將敬福經的形成下限定在唐高宗顯慶四年龍興寺供養經目録以大唐內典録入藏録為基礎撰成而大唐內典録中明明著録著敬福經為疑偽經既然如此龍興寺供養經目録為什麼還會收入敬福經呢是管藏僧人一時的疏忽嗎敬福經的主題是闡述現世僧俗寫經造像應該遵循的原則指斥當時在寫經造像過程中出現的種種不如法亂像在諸多疑偽經中主題如此集中在寫經造像的規範上是比較少見的由此我認為敦煌僧人把這部經典收入龍興寺經藏目録大約不是無意地混入從伯號可知吐蕃時期敦煌曾經有過大規模的鈔補佛經的活動所以敦煌僧人把這樣一部按照正統佛教的傳統應該祕寢以救世的疑偽經收歸入藏大概是有意告誡有關從事寫經造藏的僧人必須按照規範從事寫經造藏活動在拙作略談大藏經的三種功能形態中我提出大藏經有義理型信仰性備查型三種功能形態內典録入藏録所體現的無疑主要是義理型大藏經現雖有一部疑偽經入藏還不至於改變它的的基本性質但從敬福經的入藏可以説明當時的敦煌信衆對抄經造藏抱有極為虔敬的信仰與慎重的態度至於北新號北敦號其藏經形態如我在關於敦煌遺書北新八六七號中指出的相比之下北新號與吐蕃統治時期敦煌龍興寺藏經目録既有相似又有區別例如這兩部經録都沒有收入本事經七卷一帙內典録入藏録編序為號與釋摩男本經一卷內典録入藏録編序為號等兩部經而且在這兩部經的相關位置其他諸經的排列次序完全相同這似乎説明兩者有某種關係但是北新號又有若干部龍興寺藏經目録所沒有的經典從若干不足帙的情況分析與其説它上承龍興寺目録不如説它依據內典録入藏録編成更為妥適從總體來看它與龍興寺目録的區別要大於相似我想這一方面是因為上述龍興寺目録首殘相當一部分經典無從比較另一方面大約隨著時間的推移敦煌地區的藏經組織形式又有所改進例如龍興寺目録中的新翻經目録就是一個與整體不甚協調的部分既不協調就會進行改進總之北新號與龍興寺目録的這種不同説明它不是直接承接龍興寺目録而來所以就敦煌大藏經的內典録時期我們似乎又可以細分為三個階段第一個階段是大唐內典録傳到敦煌到吐蕃統治初期這個時期的敦煌經藏大體按照內典録入藏録組織第二個階段是吐蕃統治時期這時敦煌藏經的標準形式可見龍興寺經藏目録即經過改造的內典録入藏録第三個時期是歸義軍時期又恢復到大體按照內典録入藏録組織的樣態當然上面所説僅就一般傾向而言寫本藏經的基本特點是每部藏經都是單獨造出的具有唯一性因此個性突出不同的藏經很難做到完全划一在第一個時期敦煌僧人如何處理新譯經必有其一定的方法在第二時期龍興寺經藏目録在全敦煌有多大的權威性也應該研究在第三時期我們所依據的北新八六七號可能是吳法成和尚從靈圖寺經藏中借出的部分並非經藏全貌所以我們利用它研究敦煌經藏應該注意它的這一局限四敦煌大藏經的開元録時期敦煌遺書中保存著一批被研究者稱為沙洲乞經狀的文獻它們是藏於俄國聖彼得堡的孟號孟號孟號藏於法國巴黎的伯號伯號藏於英國倫敦的斯號斯號斯號這批文獻紀録了五代時由蓮臺寺僧人應寶發起的一次乞補藏經活動孟號釐米釐米正反兩面書寫共行文字內容相連謂沙洲蓮台寺律僧應寶右某蓋為當寺藏內即有兌落經本遂發志願遊步上都求十信之壇那添三乘之欠教慮恐中國之關津口鋪不隔邊地行化鄉人所到不練於行化由請詳公憑而放過專候處分牒件孟號釐米釐米行第一行書於上部偏左處第二行寫在第一行左邊餘五行均為從右向左書寫與我國漢字直行書寫的傳統剛好相反録文如下沙洲住蓮台寺律僧應寶右應寶伏睹當寺藏內部帙中遺失經本實無得處應寶遂發微願意欲上都求十信之壇那添三乘之欠教倘或成就傳授後來且有利於凡夫亦不無於因果慮恐之關津口鋪不勒之行化鄉人所到不揀練於行由請詳憑印而放過伏聽處分從書寫形態看上述兩號顯然應該是應寶決定乞經補藏時所寫的請求頒發過所的牒狀草稿這兩號的筆迹與孟號等諸號乞經狀完全一致內容也在在呼應充分説明這次乞經補藏活動是應寶發起的從上述引文可知應寶是蓮臺寺律僧但他在當時的敦煌佛教教團究竟處在何種地位這次乞經活動是整個敦煌教團的活動還是他個人的行為都需要進一步研究其餘諸號乞經狀所録大抵為希望求乞的佛典目録仔細考察這些目録可以發現它們有著明顯的遞承關係反映了這次乞經補藏活動的全過程其中孟號大約是乞經狀的草稿這可以從稿中文字多塗抹修改卷末之疏告尚有語意不暢之處以及所録經典有刪除等情得到證實此外孟號的若干部經列有著譯者姓名想必是最初擬稿時列上其後覺得沒有必要故抄清時又刪除了斯號則是孟號的謄清定稿也是最後確定的這次乞經活動所需尋訪的經典的底帳斯號是斯號抄本斯號伯號也都是斯號的抄本底帳是留而備查的備忘録抄本是廣為散發的疏告憑此在各地求訪缺本經過一個階段的努力敦煌的僧衆終於求訪到他們所缺的部經典中的部所以在斯號這部佛經的旁邊注上罷卻二字即不用再尋訪了而將尚未能訪求到的經典另立清單繼續尋覓這就是伯號的由來在斯號中祇有部經典未注罷卻但伯號中卻羅列了部經典其中沙彌十戒法並威儀在斯號中屬於已經尋訪到的經典既已經訪到為什麼還要尋求呢我想這也許是由於誤抄但更大的可能是前此訪求到的該威儀抄寫質量不高錯訛較多不堪使用故不得不再訪一部這可從伯號末尾特別強調的如或寫者切須三校不請有留錯字也窺見其消息使我感興趣的是應寶依據什麼目録檢查本地藏經從而發現有缺失呢換一句話説他根據什麼目録來組織藏經呢斯號是應寶此次乞經活動的底帳上面共抄録部經典仔細審視該號部經典的排列可以看到有嚴密的次序大乘在前小乘在後並分別用大乘小乘提示之最後的賢聖集傳可能因為僅一部的緣故未標綱目在大小乘兩部中又嚴格按照經律論的先後次序排列由於斯號上的經典排序嚴謹我們便可以根據它的這一特點來鑒別它所依憑的目録因為歷代採用用這種結構來編纂入藏録的祇有大周録開元録貞元録三部因此我們可以把注意力集中在這三部目録上又由於斯號中所載的義淨所譯的幾部律均出於大周録編成之後為大周録所不載而大乘造像功德經又為貞元録所不載那麼剩下的就祇有開元録了如果將斯號與開元録入藏録仔細對照那麼可以發現斯號的這部經不但總體結構安排與開元録一致而且每部經的先後次序均與開元録所載相符不僅斯號如此乞經狀的草稿孟號也同樣如此因此應寶當初依據的就是開元録入藏録可以説是毫無疑問的了根據我的研究應寶的這次乞經補藏活動發生在五代也就是説最遲到五代敦煌地區的大藏經的組織已經進入以開元録入藏録為依據的時期如前所述直到晚唐敦煌地區的佛教大藏經仍以大唐內典録入藏録為依據此時則改以開元釋教録入藏録為依據這一變化與會昌廢佛後我國普遍出現的以開元釋教録入藏録規範本地藏經的大藏經統一趨勢是一致的這説明敦煌地區的大藏經的確受到中原大藏經的制約與影響敦煌地區的大藏經其後的情況如何呢大量的資料證明五代宋初敦煌地區的大藏經與全國一樣都是以開元録入藏録為依據組織不僅如此這時千字文帙號也已經在這裏普遍流傳如伯號就是開元録入藏録的一個節略綱要全藏分帙從天到英用了個千字文帙號這正是附有千字文帙號的開元釋教録略出的標準形態此外伯號伯號伯號斯號斯號斯號伯號北敦號